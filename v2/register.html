<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>移動しました｜KONNEKT AI情報ハブ</title>
  <meta name="robots" content="noindex, nofollow" />
  <!-- 事例登録フォームは register-hub.html に一本化（2026-07-18）。
       この /register.html は旧URL互換のためのリダイレクトのみ。クエリ・ハッシュは引き継ぐ。 -->
  <link rel="canonical" href="./register-hub.html" />
  <meta http-equiv="refresh" content="0; url=./register-hub.html" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔷</text></svg>" />
  <style>
    body{margin:0;background:#F5F5F7;color:#1D1D22;
      font-family:"Noto Sans JP","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
      display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;-webkit-font-smoothing:antialiased;}
    .box{padding:32px 24px;}
    .box .dia{font-size:34px;}
    .box p{font-size:14px;color:#6E6E76;margin:14px 0 18px;line-height:1.7;}
    .box a{display:inline-block;background:#2563EB;color:#fff;font-weight:700;font-size:14px;
      border-radius:10px;padding:12px 24px;text-decoration:none;box-shadow:0 3px 10px rgba(37,99,235,.28);}
  </style>
</head>
<body>
  <div class="box">
    <div class="dia">🔷</div>
    <p>事例登録フォームは新しいページに移動しました。<br>自動で移動しない場合は下のボタンから。</p>
    <a id="go" href="./register-hub.html">＋ 事例を登録する →</a>
  </div>
  <script>
    // クエリ文字列・ハッシュを引き継いで即リダイレクト
    (function () {
      var target = './register-hub.html' + location.search + location.hash;
      document.getElementById('go').setAttribute('href', target);
      location.replace(target);
    })();
  </script>
</body>
</html>
