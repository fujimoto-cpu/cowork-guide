<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" class="cori-svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCE7F3"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <radialGradient id="cheekGrad">
      <stop offset="0%" stop-color="#FBCFE8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FBCFE8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 影 -->
  <ellipse cx="100" cy="205" rx="50" ry="6" fill="#000" opacity="0.08"/>

  <!-- 足 -->
  <g class="cori-feet">
    <rect x="78" y="180" width="16" height="20" rx="5" fill="#374151"/>
    <rect x="106" y="180" width="16" height="20" rx="5" fill="#374151"/>
  </g>

  <!-- 体 -->
  <g class="cori-body">
    <rect x="60" y="110" width="80" height="80" rx="22" fill="url(#bodyGrad)" stroke="#374151" stroke-width="3"/>
    <!-- 胸の星バッジ -->
    <circle cx="100" cy="145" r="14" fill="#FCD34D" stroke="#374151" stroke-width="2"/>
    <text x="100" y="151" text-anchor="middle" font-size="16" fill="#92400E" font-weight="900">✦</text>
  </g>

  <!-- 左手（揺れる）— transform-origin は CSS 側 -->
  <g class="cori-arm-left">
    <rect x="38" y="125" width="24" height="12" rx="6" fill="url(#bodyGrad)" stroke="#374151" stroke-width="3"/>
    <circle cx="40" cy="131" r="7" fill="#FBCFE8" stroke="#374151" stroke-width="2.5"/>
  </g>

  <!-- 右手 -->
  <g class="cori-arm-right">
    <rect x="138" y="125" width="24" height="12" rx="6" fill="url(#bodyGrad)" stroke="#374151" stroke-width="3"/>
    <circle cx="160" cy="131" r="7" fill="#FBCFE8" stroke="#374151" stroke-width="2.5"/>
  </g>

  <!-- 頭 -->
  <g class="cori-head">
    <!-- アンテナ -->
    <line x1="100" y1="35" x2="100" y2="20" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
    <circle cx="100" cy="16" r="6" fill="#F472B6" stroke="#374151" stroke-width="2.5">
      <animate attributeName="r" values="6;7;6" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- 顔本体 -->
    <rect x="48" y="38" width="104" height="78" rx="28" fill="#FFFFFF" stroke="#374151" stroke-width="3"/>

    <!-- ほっぺ -->
    <circle cx="68" cy="88" r="10" fill="url(#cheekGrad)"/>
    <circle cx="132" cy="88" r="10" fill="url(#cheekGrad)"/>

    <!-- 目（瞬き対応） -->
    <g class="cori-eyes">
      <ellipse cx="78" cy="78" rx="6" ry="8" fill="#1F2937" class="cori-eye-left"/>
      <ellipse cx="122" cy="78" rx="6" ry="8" fill="#1F2937" class="cori-eye-right"/>
      <!-- ハイライト -->
      <circle cx="80" cy="74" r="2" fill="#fff"/>
      <circle cx="124" cy="74" r="2" fill="#fff"/>
    </g>

    <!-- 口（笑顔） -->
    <path class="cori-mouth" d="M 88 95 Q 100 105 112 95" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
